<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/products">Shree Sidhivinayak</a>
        <a href="/cart" class="btn btn-warning">🛒 View Cart</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Available Products</h2>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 th:text="${product.name}"></h5>
                    <p>₹ <span th:text="${product.price}"></span></p>

                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-danger btn-sm action-btn"
                                th:data-id="${product.id}" data-action="decrease">➖</button>

                        <span th:text="${cart.containsKey(product.id) ? cart[product.id] : 0}"></span>        

                        <button class="btn btn-success btn-sm action-btn"
                                th:data-id="${product.id}" data-action="increase">➕</button>

                        <button class="btn btn-dark btn-sm action-btn"
                                th:data-id="${product.id}" data-action="remove">❌</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelectorAll(".action-btn").forEach(btn => {
    btn.addEventListener("click", function () {
        const id = this.getAttribute("data-id");
        const action = this.getAttribute("data-action");

        fetch(`/cart/${action}/${id}`)
            .then(() => window.location.reload());
    });
});
</script>

</body>
